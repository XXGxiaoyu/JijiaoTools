<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SwiftFlow Popup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#d2d9f4",
                        "inverse-primary": "#b4c5ff",
                        "primary": "#004ac6",
                        "background": "#faf8ff",
                        "on-tertiary-fixed": "#360f00",
                        "surface-variant": "#dae2fd",
                        "on-secondary-fixed-variant": "#43474b",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-bright": "#faf8ff",
                        "on-secondary-container": "#5e6367",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-surface-variant": "#434655",
                        "on-surface": "#131b2e",
                        "on-primary-fixed": "#00174b",
                        "surface": "#faf8ff",
                        "surface-container": "#eaedff",
                        "tertiary-fixed": "#ffdbcd",
                        "surface-tint": "#0053db",
                        "tertiary-fixed-dim": "#ffb596",
                        "primary-fixed": "#dbe1ff",
                        "inverse-surface": "#283044",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-on-surface": "#eef0ff",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#dae2fd",
                        "secondary-container": "#dce0e4",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c3c7cb",
                        "tertiary": "#943700",
                        "on-primary-container": "#eeefff",
                        "primary-container": "#2563eb",
                        "on-primary": "#ffffff",
                        "secondary": "#5a5f62",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#171c1f",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e2e7ff",
                        "on-tertiary": "#ffffff",
                        "outline": "#737686",
                        "surface-container-low": "#f2f3ff",
                        "on-background": "#131b2e",
                        "tertiary-container": "#bc4800",
                        "on-tertiary-container": "#ffede6",
                        "secondary-fixed": "#dfe3e7",
                        "outline-variant": "#c3c6d7",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "16px",
                        "popup-width": "360px",
                        "popup-max-height": "500px",
                        "element-gap": "8px",
                        "stack-gap": "12px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "label-xs": ["Inter"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    "fontSize": {
                        "headline-sm": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "label-md": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                        "label-xs": ["11px", {"lineHeight": "14px", "letterSpacing": "0.02em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            width: 360px;
            height: 500px;
            margin: 0;
            overflow: hidden;
            background-color: #faf8ff;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c3c6d7;
            border-radius: 10px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .console-line {
            border-left: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .console-line:hover {
            border-left-color: #2563eb;
            background: rgba(37, 99, 235, 0.05);
        }
    </style>
</head>
<body class="flex flex-col font-body-md text-on-surface bg-background">
<!-- Top Navigation Bar -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center w-full px-container-padding h-12 shrink-0">
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">SwiftFlow</h1>
</div>
<div class="flex gap-2">
<button class="p-1.5 rounded-lg hover:bg-surface-container-low transition-colors cursor-pointer active:scale-95 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">help</span>
</button>
<button class="p-1.5 rounded-lg hover:bg-surface-container-low transition-colors cursor-pointer active:scale-95 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col p-container-padding gap-stack-gap overflow-hidden">
<!-- Action Card -->
<div class="p-1 bg-surface-container rounded-xl">
<button class="w-full py-4 bg-primary-container text-on-primary-container rounded-lg font-label-md text-label-md flex flex-col items-center justify-center gap-1 shadow-sm hover:brightness-110 active:scale-[0.98] transition-all" id="start-btn">
<span class="material-symbols-outlined text-[28px]" id="btn-icon" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span id="btn-text" class="">开始执行</span>
</button>
</div>
<!-- Stats Row (Bento Style) -->
<div class="grid gap-element-gap grid-cols-1">

<div class="bg-surface-container-low p-3 rounded-lg border border-outline-variant">
<span class="text-on-surface-variant font-label-xs text-label-xs block mb-1">当前状态</span>
<span class="font-label-md text-label-md text-tertiary flex items-center gap-1">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse" style="opacity: 1;"></span>
                    待机中
                </span>
</div>
</div>
<!-- Console Section -->
<div class="flex-1 flex flex-col bg-surface-container-lowest border border-outline-variant rounded-lg overflow-hidden shadow-sm">
<div class="bg-surface-container h-8 px-3 flex items-center justify-between border-b border-outline-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-on-surface-variant">terminal</span>
<span class="font-label-xs text-label-xs text-on-surface-variant uppercase tracking-wider">控制台输出</span>
</div>
<button class="text-label-xs text-primary hover:underline cursor-pointer" id="clear-console">清除</button>
</div>
<div class="flex-1 p-3 font-mono text-[11px] leading-relaxed overflow-y-auto custom-scrollbar bg-white" id="console-logs">
<div class="console-line text-on-surface-variant mb-1">[10:24:01] <span class="text-primary font-bold">INFO</span> 正在初始化核心引擎...</div>
<div class="console-line text-on-surface-variant mb-1">[10:24:02] <span class="text-primary font-bold">INFO</span> 已连接到远程服务器</div>
<div class="console-line text-on-surface-variant mb-1">[10:24:05] <span class="text-secondary font-bold">TASK</span> 正在运行工作流序列...</div>
<div class="console-line text-outline mb-1 opacity-50 italic">等待输入...</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="h-10 px-container-padding flex items-center justify-between border-t border-outline-variant bg-surface-container-low shrink-0">
<div class="flex items-center gap-2">
<span class="font-label-xs text-label-xs text-outline">v1.0.4</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span class="font-label-xs text-label-xs text-outline">系统就绪</span>
</div>
<a class="font-label-xs text-label-xs text-primary flex items-center gap-1 hover:underline" href="#">
            查看历史
            <span class="material-symbols-outlined text-[12px]">arrow_forward</span>
</a>
</footer>
<script>
        const startBtn = document.getElementById('start-btn');
        const btnText = document.getElementById('btn-text');
        const btnIcon = document.getElementById('btn-icon');
        const logs = document.getElementById('console-logs');
        const clearBtn = document.getElementById('clear-console');
        
        let isRunning = false;

        function addLog(message, type = 'INFO') {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            const logEntry = document.createElement('div');
            logEntry.className = 'console-line text-on-surface-variant mb-1';
            
            let typeColor = 'text-primary';
            if (type === 'SUCCESS') typeColor = 'text-tertiary';
            if (type === 'WARN') typeColor = 'text-error';

            logEntry.innerHTML = `[${time}] <span class="${typeColor} font-bold">${type}</span> ${message}`;
            logs.appendChild(logEntry);
            logs.scrollTop = logs.scrollHeight;
        }

        startBtn.addEventListener('click', () => {
            isRunning = !isRunning;
            
            if (isRunning) {
                btnText.textContent = '停止执行';
                btnIcon.textContent = 'stop';
                startBtn.classList.replace('bg-primary-container', 'bg-error-container');
                startBtn.classList.replace('text-on-primary-container', 'text-on-error-container');
                
                addLog('用户发起了工作流序列...', 'TASK');
                setTimeout(() => addLog('正在分析数据包...', 'INFO'), 600);
                setTimeout(() => addLog('加密密钥验证通过。', 'SUCCESS'), 1400);
                setTimeout(() => addLog('正在流式传输实时遥测数据...', 'INFO'), 2200);
            } else {
                btnText.textContent = '开始执行';
                btnIcon.textContent = 'play_arrow';
                startBtn.classList.replace('bg-error-container', 'bg-primary-container');
                startBtn.classList.replace('text-on-error-container', 'text-on-primary-container');
                addLog('用户已停止执行。', 'WARN');
            }
        });

        clearBtn.addEventListener('click', () => {
            logs.innerHTML = '<div class="console-line text-outline mb-1 opacity-50 italic">控制台已清除。就绪...</div>';
        });

        // Atmospheric effect: subtle flicker on the "Active" dot
        setInterval(() => {
            const dot = document.querySelector('.animate-pulse');
            if(dot) {
                dot.style.opacity = Math.random() > 0.5 ? '1' : '0.6';
            }
        }, 1500);
    </script>


</body></html>
